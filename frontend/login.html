<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SASE UH Login</title>
  <style>
    /* Container for the entire viewport */
    body {
      margin: 0;
      font-family: "Trebuchet MS", sans-serif;
      background-color: #f0f2f5; /* Light grey background from design */
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    /* The main white card */
    .login-card {
      display: flex;
      background: white;
      width: 1000px;
      height: 600px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    /* Left Column Styling */
    .login-left {
      flex: 1.2;
      padding: 60px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      color: #1a2b48; 
    }

    .login-left h1 {
      font-size: 3em;
      margin-bottom: 10px;
      color: #1a2b48;
    }

    .subtitle {
      color: #4a5568;
      margin-bottom: 40px;
      font-size: 1.1em;
      line-height: 1.5;
    }

    .login-left input {
      background: #f7fafc;
      border: 2px solid #cbd5e0;
      border-radius: 30px; /* Rounded pill shape */
      padding: 15px 25px;
      width: 100%;
      margin-bottom: 20px;
      color: #1a2b48;
      font-size: 1em;
      box-sizing: border-box;
    }

    .login-left button {
      background-color: #4b5320; /* Olive green from design */
      color: white;
      border-radius: 30px;
      padding: 15px;
      font-size: 1.1em;
      font-weight: bold;
      border: none;
      cursor: pointer;
      width: 100%;
      transition: background 0.3s;
    }

    .login-left button:hover {
      background-color: #3a4118;
    }

    .logo-footer {
      margin-top: 50px;
    }

    .logo-footer img {
      width: 220px;
    }

    /* Right Column Styling */
    .login-right {
      flex: 1;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .graphic-box {
      background: white;
      width: 100%;
      height: 100%;
      border-radius: 40px; /* Highly rounded corners */
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 10px 10px 0px rgba(0,0,0,0.05); /* Soft drop shadow */
    }

    .graphic-box img {
      max-width: 80%;
      height: auto;
    }

    /* ------------------ POPUP STYLES ------------------ */
    #errorPopup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .popup-hidden {
      display: none !important;
    }

    .popup-content {
      background-color: #ffffff;
      border: 2px solid #4b5320;
      border-radius: 10px;
      padding: 25px;
      width: 300px;
      text-align: center;
      color: #1a2b48;
      box-shadow: 0 0 18px rgba(0,0,0,0.2);
      position: relative;
    }

    .close-btn {
      position: absolute;
      top: 8px;
      right: 12px;
      cursor: pointer;
      font-size: 20px;
      font-weight: bold;
      color: #4b5320;
    }

    /* Mobile Responsiveness */
    @media (max-width: 900px) {
      .login-card {
        flex-direction: column;
        width: 90%;
        height: auto;
      }
      .login-right {
        display: none; /* Hide graphic on small screens */
      }
    }
  </style>
</head>

<body>

  <div class="login-card">
    <div class="login-left">
      <h1>Welcome back!</h1>
      <p class="subtitle">We're happy to be able to help you in your career journey</p>
      
      <form onsubmit="return handleLogin(event)">
        <input type="text" id="login-uhid" placeholder="Enter your UH ID" required />
        <button type="submit">Login</button>
      </form>

      <div class="logo-footer">
        <img src="images/saselogo.webp" alt="SASE Logo" />
      </div>
    </div>

    <div class="login-right">
      <div class="graphic-box">
        <img src="images/panda-graphic.png" alt="Panda Graphic" />
      </div>
    </div>
  </div>

  <div id="errorPopup" class="popup-hidden">
    <div class="popup-content">
      <span class="close-btn" onclick="closePopup()">×</span>
      <p id="popupMessage"></p>
    </div>
  </div>

<script>
  function showPopup(message) {
    document.getElementById("popupMessage").textContent = message;
    document.getElementById("errorPopup").classList.remove("popup-hidden");
  }

  function closePopup() {
    document.getElementById("errorPopup").classList.add("popup-hidden");
  }

  async function handleLogin(event) {
    event.preventDefault();
    const uh_id = document.getElementById("login-uhid").value.trim();

    try {
      const res = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ uh_id })
      });

      const data = await res.json();

      if (data.message !== "Login successful") {
        showPopup(data.message);
        return false;
      }

      const user = data.user;

      localStorage.setItem("loggedIn", "true");
      localStorage.setItem("loginTime", Date.now().toString());
      localStorage.setItem("uh_id", user.uh_id);
      localStorage.setItem("admin", user.admin);

      window.location.href = "/index.html";
      return false;

    } catch (err) {
      console.error("Login failed:", err);
      showPopup("Login failed. Please try again.");
      return false;
    }
  }
</script>

</body>
</html>
