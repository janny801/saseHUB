<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SASE UH Member Hub</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <script>
    const loggedIn = localStorage.getItem("loggedIn");
    const loginTime = localStorage.getItem("loginTime");
    const oneHour = 60 * 60 * 1000;

    if (!loggedIn || !loginTime || Date.now() - parseInt(loginTime) > oneHour) {
      localStorage.removeItem("loggedIn");
      localStorage.removeItem("loginTime");
      localStorage.removeItem("admin");
      localStorage.removeItem("uh_id");
      window.location.href = "/login.html";
    }
  </script>
</head>

<body>

  <div class="dashboard-container">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <img src="images/saselogo.webp" alt="SASE Logo" />
      </div>
      
      <nav class="nav-menu">
        <a href="index.html" class="nav-item active">
          <i class="fa-solid fa-house icon"></i> Home
        </a>
        <a href="pages/research.html" class="nav-item">
          <i class="fa-solid fa-flask icon"></i> Undergrad Research
        </a>
        <a href="pages/resources.html" class="nav-item">
          <i class="fa-solid fa-book icon"></i> Professional Resources
        </a>
        <a href="pages/internships.html" class="nav-item">
          <i class="fa-solid fa-briefcase icon"></i> Internship Database
        </a>
        <a href="pages/alumni.html" class="nav-item">
          <i class="fa-solid fa-user-group icon"></i> Alumni Network
        </a>

        <div class="nav-divider"></div>

        <a href="pages/admin.html" id="adminBtn" class="nav-item admin-only">
          <i class="fa-solid fa-user-shield icon"></i> Admin Portal
        </a>

        <a href="profile.html" class="nav-item">
          <i class="fa-solid fa-user icon"></i> Profile
        </a>
        <a href="#" onclick="logout()" class="nav-item logout-item">
          <i class="fa-solid fa-right-from-bracket icon"></i> Logout
        </a>
      </nav>

      <footer class="sidebar-footer">
        <p>© 2026 SASE UH</p>
      </footer>
    </aside>

    <main class="main-content">
      <header class="content-header">
        <div class="header-text">
          <h1>Home</h1>
          <p>Welcome to the Society of Asian Scientists and Engineers Member Hub</p>
        </div>
      </header>

      <div class="content-body">
        <section class="calendar-card">
          <div class="card-header">
            <h2>Event Calendar</h2>
            <p>Stay updated with all our upcoming events and chapter meetings.</p>
          </div>
          <div class="calendar-wrapper">
            <iframe 
              src="https://calendar.google.com/calendar/embed?src=pj0bbgntupi45kudqqfclr25tk%40group.calendar.google.com&ctz=America%2FChicago"
              style="border:0"
              width="100%"
              height="600"
              frameborder="0"
              scrolling="no">
            </iframe>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const isAdmin = localStorage.getItem("admin");
      const adminBtn = document.getElementById("adminBtn");
      if (adminBtn) {
        if (isAdmin === "1") {
          adminBtn.style.display = "flex";
        } else {
          adminBtn.style.display = "none";
        }
      }
    });

    function logout() {
      localStorage.removeItem("loggedIn");
      localStorage.removeItem("loginTime");
      localStorage.removeItem("admin");
      localStorage.removeItem("uh_id");
      window.location.href = "/login.html";
    }
  </script>
  <script src="script.js"></script>

</body>
</html>
