<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Undergraduate Research - SASE UH</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="pagestyle.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <script>
    const loggedIn = localStorage.getItem("loggedIn");
    if (loggedIn !== "true") { window.location.href = "../login.html"; }
  </script>
</head>

<body>
  <div class="dashboard-container">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <img src="../images/saselogo.webp" alt="SASE Logo" />
      </div>
      <nav class="nav-menu">
        <a href="../index.html" class="nav-item"><i class="fa-solid fa-house icon"></i> Home</a>
        <a href="research.html" class="nav-item active"><i class="fa-solid fa-flask icon"></i> Undergrad Research</a>
        <a href="resources.html" class="nav-item"><i class="fa-solid fa-book icon"></i> Professional Resources</a>
        <a href="internships.html" class="nav-item"><i class="fa-solid fa-table-list icon"></i> Internship Database</a>
        <a href="alumni.html" class="nav-item"><i class="fa-solid fa-user-group icon"></i> Alumni Network</a>
        <div class="nav-divider"></div>
        <a href="../profile.html" class="nav-item"><i class="fa-solid fa-user icon"></i> Profile</a>
        <a href="#" onclick="logout()" class="nav-item logout-item"><i class="fa-solid fa-right-from-bracket icon"></i> Logout</a>
      </nav>
      <footer class="sidebar-footer"><p>© 2026 SASE UH</p></footer>
    </aside>

    <main class="main-content research-layout">
      <div class="research-table-section">
        <header class="content-header">
          <h1>Undergrad Research</h1>
        </header>

        <section class="research-controls">
          <div class="search-wrapper">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="profSearch" placeholder="Search Professor" onkeyup="applyFilters()">
          </div>
          
          <div class="filter-group">
            <div class="filter-pill-container">
              <button class="filter-pill" onclick="toggleFilter(event, 'college')">
                <i class="fa-solid fa-filter"></i> College
              </button>
              <div id="collegeMenu" class="filter-dropdown"></div>
            </div>

            <div class="filter-pill-container">
              <button class="filter-pill" onclick="toggleFilter(event, 'major')">
                <i class="fa-solid fa-filter"></i> Major
              </button>
              <div id="majorMenu" class="filter-dropdown"></div>
            </div>
          </div>
        </section>

        <div class="database-container">
          <table class="intern-table" id="profTable">
            <thead>
              <tr>
                <th>Name</th>
                <th>College</th>
                <th>Major(s)</th>
                <th>Email</th>
              </tr>
            </thead>
            <tbody id="profTableBody">
            </tbody>
          </table>
        </div>
      </div>

      <aside class="prof-profile-sidebar" id="profSidebar">
        <div class="sidebar-controls">
            <div class="nav-arrows">
                <i class="fa-solid fa-chevron-left" onclick="navProfessor(-1)" style="cursor:pointer; margin-right:15px;"></i>
                <i class="fa-solid fa-chevron-right" onclick="navProfessor(1)" style="cursor:pointer;"></i>
            </div>
            <div class="action-btns">
                <button class="bookmark-btn" id="sidebarSaveBtn"><i class="fa-regular fa-bookmark"></i></button>
                <i class="fa-solid fa-xmark close-sidebar" onclick="closeSidebar()" style="cursor:pointer; font-size:1.5rem; margin-left:15px;"></i>
            </div>
        </div>
        
        <div id="sidebarContent" class="sidebar-scroll">
            <div class="prof-avatar">
                <img id="sideImg" src="../images/saselogo.webp" alt="Professor">
            </div>
            <h2 id="sideName">Select a Professor</h2>
            <p id="sideMajor" class="side-subtitle">Department</p>
            
            <div class="social-links">
                <i class="fa-solid fa-envelope"></i>
                <i class="fa-solid fa-globe"></i>
            </div>

            <div class="about-section">
                <h3>About</h3>
                <p id="sideDesc">Click on a professor in the table to view their research details and lab opportunities.</p>
            </div>
        </div>
      </aside>
    </main>
  </div>

  <script src="research.js"></script>
</body>
</html>
