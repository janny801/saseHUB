<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Internship Database - SASE UH</title>
  
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="pagestyle.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <script>
    const loggedIn = localStorage.getItem("loggedIn");
    if (loggedIn !== "true") {
      window.location.href = "../login.html";
    }
  </script>
</head>

<body>

  <div class="dashboard-container">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <img src="../images/saselogo.webp" alt="SASE Logo" />
      </div>
      
      <nav class="nav-menu">
        <a href="../index.html" class="nav-item">
          <i class="fa-solid fa-house icon"></i> Home
        </a>
        <a href="research.html" class="nav-item">
          <i class="fa-solid fa-flask icon"></i> Undergrad Research
        </a>
        <a href="resources.html" class="nav-item">
          <i class="fa-solid fa-book icon"></i> Professional Resources
        </a>
        <a href="internships.html" class="nav-item active">
          <i class="fa-solid fa-table-list icon"></i> Internship Database
        </a>
        <a href="alumni.html" class="nav-item">
          <i class="fa-solid fa-user-group icon"></i> Alumni Network
        </a>

        <div class="nav-divider"></div>

        <a href="../profile.html" class="nav-item">
          <i class="fa-solid fa-user icon"></i> Profile
        </a>
        <a href="#" onclick="logout()" class="nav-item logout-item">
          <i class="fa-solid fa-right-from-bracket icon"></i> Logout
        </a>
      </nav>

      <footer class="sidebar-footer">
        <p>© 2026 SASE UH</p>
      </footer>
    </aside>

    <main class="main-content">
      <header class="content-header">
        <h1>Internship Database</h1>
        <p>Explore opportunities and save them to your personal tracker.</p>
      </header>

      <section class="database-controls">
        <div class="search-wrapper">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" id="internshipSearch" placeholder="Search by company, role, or keyword..." onkeyup="filterInternships()">
        </div>
      </section>

      <div class="database-container">
        <table class="intern-table" id="internTable">
          <thead>
            <tr>
              <th>Company</th>
              <th>Role</th>
              <th>Location</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="internTableBody">
            <tr>
              <td colspan="5" style="text-align:center; padding: 40px; color: #718096;">
                Loading internship data...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script>
    function logout() {
      localStorage.clear();
      window.location.href = "../login.html";
    }

    function filterInternships() {
      const input = document.getElementById("internshipSearch").value.toLowerCase();
      const table = document.getElementById("internTable");
      const tr = table.getElementsByTagName("tr");

      for (let i = 1; i < tr.length; i++) {
        const rowText = tr[i].textContent.toLowerCase();
        tr[i].style.display = rowText.includes(input) ? "" : "none";
      }
    }
  </script>

</body>
</html>
